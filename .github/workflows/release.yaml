name: Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a release from main"
        required: true
        default: true
        type: boolean
      release_type:
        description: "Release type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - major

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.ref == 'refs/heads/main' && inputs.create_release }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: echo "version=$(bash ./scripts/next-version.sh ${{ inputs.release_type }})" >> "$GITHUB_OUTPUT"

      - name: Update VERSION
        run: |
          printf '%s\n' "${{ steps.version.outputs.version }}" > VERSION
          git add VERSION
          git commit -m "Release ${{ steps.version.outputs.version }}"

      - name: Tag release
        run: git tag "${{ steps.version.outputs.version }}"

      - name: Push commit and tag
        run: git push origin main --follow-tags

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
